services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: moodyblues
      POSTGRES_USER: moodyblues
      POSTGRES_PASSWORD: moodyblues
    ports:
      - "5432:5432"
    volumes:
      - moodyblues-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moodyblues -d moodyblues"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Bind all interfaces inside the container; this port is never published to the host (see
      # `networks` below) -- the only way in from the public internet is through the
      # already-running Nginx Proxy Manager (see README.md's "HTTPS/TLS"), which reaches this
      # container over the shared `proxy` Docker network instead.
      MOODYBLUES_HOST: "0.0.0.0"
      # The hostname clients can actually reach this box on -- handed back in
      # webSocketUrl/sceneUploadUrl by POST /handshake. Set this in a .env file next to this
      # compose file (MOODYBLUES_PUBLIC_HOST=<domain-name>). Must be a real DNS name (behind
      # Cloudflare's proxy is fine -- see README.md's "HTTPS/TLS"), NOT a bare IP or 0.0.0.0.
      MOODYBLUES_PUBLIC_HOST: "${MOODYBLUES_PUBLIC_HOST:?Set MOODYBLUES_PUBLIC_HOST in a .env file to the server's public domain name}"
      # Clients are told to use https/wss on port 443 (Nginx Proxy Manager), not the internal
      # http/8765 Kestrel actually binds above.
      MOODYBLUES_PUBLIC_SCHEME: "https"
      MOODYBLUES_PUBLIC_PORT: "443"
      MOODYBLUES_PORT: "8765"
      MOODYBLUES_DB_CONNECTION: "Host=db;Port=5432;Database=moodyblues;Username=moodyblues;Password=moodyblues"
    volumes:
      - moodyblues-logs:/app/logs
      - moodyblues-scenes:/app/scenes
    networks:
      default: {} # talks to the `db` service above
      proxy:
        aliases:
          - moodyblues-backend # what to enter as the Forward Hostname/IP in NPM's proxy host

volumes:
  moodyblues-db-data:
  moodyblues-logs:
  moodyblues-scenes:

networks:
  proxy:
    external: true # the network the already-running Nginx Proxy Manager container is on
